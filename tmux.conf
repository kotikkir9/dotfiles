unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

set -g escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 5000
setw -g mode-keys vi

# Splits
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize mode — Leader+H/J/K/L to enter, keep pressing to continue, Escape to exit
bind H { resize-pane -L 5 ; switch-client -T resize-pane }
bind J { resize-pane -D 5 ; switch-client -T resize-pane }
bind K { resize-pane -U 5 ; switch-client -T resize-pane }
bind L { resize-pane -R 5 ; switch-client -T resize-pane }

bind -T resize-pane H { resize-pane -L 5 ; switch-client -T resize-pane }
bind -T resize-pane J { resize-pane -D 5 ; switch-client -T resize-pane }
bind -T resize-pane K { resize-pane -U 5 ; switch-client -T resize-pane }
bind -T resize-pane L { resize-pane -R 5 ; switch-client -T resize-pane }
bind -T resize-pane Escape switch-client -T root
